name: Hyperbolic Demo
description: Run a prompt through the Hyperbolic API
author: GitHub Actions

inputs:
  api-key:
    description: Hyperbolic API key
    required: true
  prompt:
    description: The user prompt to send
    required: true
  model:
    description: Model to use
    required: true
    default: 'deepseek-ai/DeepSeek-R1-0528'
  max-tokens:
    description: Maximum tokens for the response
    required: false
    default: '16384'
  temperature:
    description: Sampling temperature
    required: false
    default: '0.7'
  top-p:
    description: Top-p sampling parameter
    required: false
    default: '0.8'

outputs:
  response:
    description: The AI response content (without reasoning)
  reasoning:
    description: The reasoning/thinking content if present

runs:
  using: node24
  main: dist/index.js
