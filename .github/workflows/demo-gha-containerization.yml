name: Demo GHA Containerization

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Summary prompt for the AI
        required: false
        default: >-
          Summarize the following emails. For each email, list the sender,
          subject, and a brief summary of the body.
        type: string
      sql-query:
        description: SQL query for SxT (use {userId} placeholder)
        required: false
        default: >-
          SELECT m.*, c.* FROM DEALSYNC_STG_V1.EMAIL_METADATA m JOIN
          DEALSYNC_STG_V1.EMAIL_CONTENTS c ON m.ID = c.EMAIL_METADATA_ID WHERE
          m.USER_ID = '{userId}' ORDER BY m.CREATED_AT DESC LIMIT 200
        type: string
      limit:
        description: Maximum number of email rows to return
        required: false
        default: '10'
        type: string
      resources:
        description: Comma-separated SxT resources
        required: false
        default: 'DEALSYNC_STG_V1.EMAIL_METADATA,DEALSYNC_STG_V1.EMAIL_CONTENTS'
        type: string
      user-id:
        description: User ID to substitute into the SQL query
        required: false
        default: '3UbRWfN3JvCRzb5XyJsWu'
        type: string
      model:
        description: Primary model
        required: false
        default: 'deepseek-ai/DeepSeek-R1-0528'
        type: string
      fallback-model:
        description: Fallback model if primary fails
        required: false
        default: 'deepseek-ai/DeepSeek-R1'
        type: string
      max-tokens:
        description: Maximum tokens for the response
        required: false
        default: '16384'
        type: string
      temperature:
        description: Sampling temperature
        required: false
        default: '0.7'
        type: string
      top-p:
        description: Top-p sampling parameter
        required: false
        default: '0.8'
        type: string

jobs:
  fetch-emails:
    name: Fetch Emails from SxT
    runs-on: ubuntu-latest
    env:
      ENCRYPTION_KEY: ${{ secrets.W3_SECRET_DEMO_ENCRYPTION_KEY }}
    outputs:
      email-summary: ${{ steps.format.outputs.email-summary }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to SxT
        id: login
        uses: w3-io/demo-gha-containerization-1/http@main
        with:
          url: https://proxy.api.makeinfinite.dev/auth/login
          method: POST
          headers: '{"Content-Type": "application/json"}'
          body: >-
            {"userId": "${{ secrets.W3_SECRET_DEMO_SXT_USER_ID }}",
             "password": "${{ secrets.W3_SECRET_DEMO_SXT_PASSWORD }}"}
          extract-outputs: 'sessionId,accessToken'
          encrypt-outputs: 'sessionId,accessToken'
          encryption-key: ${{ env.ENCRYPTION_KEY }}

      - name: Fetch Biscuit
        id: biscuit
        uses: w3-io/demo-gha-containerization-1/http@main
        with:
          url: >-
            https://proxy.api.makeinfinite.dev/biscuits/generated/${{ secrets.W3_SECRET_DEMO_SXT_BISCUIT_NAME }}
          method: GET
          headers: >-
            {"sid": "${{ steps.login.outputs.sessionId }}"}
          decrypt-inputs: 'headers.sid'
          extract-outputs: 'biscuit'
          encrypt-outputs: 'biscuit'
          encryption-key: ${{ env.ENCRYPTION_KEY }}

      - name: Build query body
        id: build-query
        env:
          ENCRYPTED_BISCUIT: ${{ steps.biscuit.outputs.biscuit }}
          SQL_QUERY: ${{ inputs.sql-query }}
          USER_ID: ${{ inputs.user-id }}
          RESOURCES: ${{ inputs.resources }}
        run: |
          BISCUIT=$(node scripts/decrypt.js "$ENCRYPTION_KEY" "$ENCRYPTED_BISCUIT")
          RESOLVED_SQL=$(echo "$SQL_QUERY" | sed "s/{userId}/$USER_ID/g")
          RESOURCES_JSON=$(echo "$RESOURCES" | jq -R 'split(",") | map(ltrimstr(" ") | rtrimstr(" "))')
          BODY=$(jq -cn \
            --arg sql "$RESOLVED_SQL" \
            --arg biscuit "$BISCUIT" \
            --argjson resources "$RESOURCES_JSON" \
            '{sqlText: $sql, biscuits: [$biscuit], resources: $resources}')
          echo "body=$BODY" >> "$GITHUB_OUTPUT"

      - name: Execute Query
        id: query
        uses: w3-io/demo-gha-containerization-1/http@main
        with:
          url: https://api.makeinfinite.dev/v1/sql
          method: POST
          headers: >-
            {"Content-Type": "application/json",
             "Authorization": "Bearer ${{ steps.login.outputs.accessToken }}"}
          body: ${{ steps.build-query.outputs.body }}
          decrypt-inputs: 'headers.Authorization'
          decode-fields: TOP_LEVEL_HEADERS,BODY_PLAIN_TEXT
          output-fields: TOP_LEVEL_HEADERS,BODY_PLAIN_TEXT
          select-keys: 'TOP_LEVEL_HEADERS:From,Subject'
          limit: ${{ inputs.limit }}
          encrypt-outputs: 'response'
          encryption-key: ${{ env.ENCRYPTION_KEY }}

      - name: Format email list
        id: format
        env:
          ENCRYPTED_RESPONSE: ${{ steps.query.outputs.response }}
        run: |
          QUERY_RESULT=$(node scripts/decrypt.js "$ENCRYPTION_KEY" "$ENCRYPTED_RESPONSE")
          summary=$(echo "$QUERY_RESULT" | jq -r '
            [.[] |
              "From: \(.TOP_LEVEL_HEADERS.From // "unknown")\nSubject: \(.TOP_LEVEL_HEADERS.Subject // "no subject")\nBody: \(.BODY_PLAIN_TEXT // "empty")\n---"
            ] | join("\n")
          ')
          {
            echo "email-summary<<SUMMARY_EOF"
            echo "$summary"
            echo "SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

  summarize:
    name: Summarize with AI
    runs-on: ubuntu-latest
    needs: fetch-emails
    env:
      ENCRYPTION_KEY: ${{ secrets.W3_SECRET_DEMO_ENCRYPTION_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build AI request body
        id: build-ai
        env:
          PROMPT: ${{ inputs.prompt }}
          EMAIL_SUMMARY: ${{ needs.fetch-emails.outputs.email-summary }}
          MODEL: ${{ inputs.model }}
          MAX_TOKENS: ${{ inputs.max-tokens }}
          TEMPERATURE: ${{ inputs.temperature }}
          TOP_P: ${{ inputs.top-p }}
        run: |
          BODY=$(jq -n \
            --arg model "$MODEL" \
            --arg prompt "$PROMPT

          $EMAIL_SUMMARY" \
            --argjson max_tokens "${MAX_TOKENS}" \
            --argjson temperature "${TEMPERATURE}" \
            --argjson top_p "${TOP_P}" \
            '{model: $model, messages: [{role: "user", content: $prompt}], max_tokens: $max_tokens, temperature: $temperature, top_p: $top_p, stream: false}')
          echo "body<<BODY_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "BODY_EOF" >> "$GITHUB_OUTPUT"

      - name: Run Primary Model
        id: primary
        uses: w3-io/demo-gha-containerization-1/http@main
        continue-on-error: true
        with:
          url: https://api.hyperbolic.xyz/v1/chat/completions
          method: POST
          headers: >-
            {"Content-Type": "application/json",
             "Authorization": "Bearer ${{ secrets.W3_SECRET_DEMO_HYPERBOLIC_API_KEY }}"}
          body: ${{ steps.build-ai.outputs.body }}
          encrypt-outputs: 'response'
          encryption-key: ${{ env.ENCRYPTION_KEY }}

      - name: Build fallback request body
        id: build-fallback
        if: steps.primary.outcome == 'failure'
        env:
          PRIMARY_BODY: ${{ steps.build-ai.outputs.body }}
          MODEL: ${{ inputs.fallback-model }}
        run: |
          BODY=$(echo "$PRIMARY_BODY" | jq --arg model "$MODEL" '.model = $model')
          echo "body<<BODY_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "BODY_EOF" >> "$GITHUB_OUTPUT"

      - name: Run Fallback Model
        id: fallback
        if: steps.primary.outcome == 'failure'
        uses: w3-io/demo-gha-containerization-1/http@main
        continue-on-error: true
        with:
          url: https://api.hyperbolic.xyz/v1/chat/completions
          method: POST
          headers: >-
            {"Content-Type": "application/json",
             "Authorization": "Bearer ${{ secrets.W3_SECRET_DEMO_HYPERBOLIC_API_KEY }}"}
          body: ${{ steps.build-fallback.outputs.body }}
          encrypt-outputs: 'response'
          encryption-key: ${{ env.ENCRYPTION_KEY }}

      - name: Log Output
        env:
          PRIMARY_RESPONSE: ${{ steps.primary.outputs.response }}
          FALLBACK_RESPONSE: ${{ steps.fallback.outputs.response }}
        run: |
          PRIMARY=$(node scripts/decrypt.js "$ENCRYPTION_KEY" "$PRIMARY_RESPONSE" 2>/dev/null) || PRIMARY=""
          FALLBACK=$(node scripts/decrypt.js "$ENCRYPTION_KEY" "$FALLBACK_RESPONSE" 2>/dev/null) || FALLBACK=""
          echo "=== Primary Model ==="
          echo "$PRIMARY" | jq -r '
            "Reasoning: \(.choices[0].message.reasoning_content // "none")",
            "Response: \(.choices[0].message.content // "none")"
          ' 2>/dev/null || echo "Response: ${PRIMARY:-none}"
          echo ""
          echo "=== Fallback Model ==="
          echo "$FALLBACK" | jq -r '
            "Reasoning: \(.choices[0].message.reasoning_content // "none")",
            "Response: \(.choices[0].message.content // "none")"
          ' 2>/dev/null || echo "Response: ${FALLBACK:-none}"
