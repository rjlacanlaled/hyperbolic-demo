name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

jobs:
  # Claude responds to @claude mentions and implements labeled issues
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read

  # Claude addresses Copilot's review feedback if there are inline comments
  address-copilot-review:
    if: |
      github.event_name == 'pull_request_review' &&
      contains(github.event.review.user.login, 'copilot')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Check for inline comments
        id: check
        run: |
          REVIEW_ID=${{ github.event.review.id }}
          COMMENTS=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews/${REVIEW_ID}/comments --jq 'length')
          echo "comment_count=$COMMENTS" >> "$GITHUB_OUTPUT"
          if [ "$COMMENTS" -gt 0 ]; then
            echo "has_feedback=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_feedback=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Comment ready for human review
        if: steps.check.outputs.has_feedback == 'false'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "Copilot reviewed this PR and found no issues. Ready for human review."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        if: steps.check.outputs.has_feedback == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Address Copilot feedback
        if: steps.check.outputs.has_feedback == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            GitHub Copilot has reviewed this PR and left inline comments with suggestions.
            Please:
            1. Read all of Copilot's review comments on this PR
            2. Address each actionable suggestion by making code changes
            3. Reply to each comment explaining what you changed and resolve the conversation
            4. After pushing fixes, comment that changes have been made and request re-review
            5. Also check CI status — if any checks failed, read the logs and fix those too

      - name: Re-request Copilot review
        if: steps.check.outputs.has_feedback == 'true'
        continue-on-error: true
        run: |
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers \
            --method POST -f "reviewers[]=copilot"
        env:
          GH_TOKEN: ${{ github.token }}

  # Notify Claude when CI fails on its branches
  notify-ci-failure:
    if: |
      github.event_name == 'check_suite' &&
      github.event.check_suite.conclusion == 'failure' &&
      startsWith(github.event.check_suite.head_branch, 'claude/')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Find PR and notify Claude
        run: |
          PR=$(gh pr list --repo ${{ github.repository }} \
            --head "${{ github.event.check_suite.head_branch }}" \
            --json number --jq '.[0].number')
          if [ -z "$PR" ]; then
            echo "No PR found for branch ${{ github.event.check_suite.head_branch }}"
            exit 0
          fi

          # Avoid infinite loops: check if last comment is already a CI fix request
          LAST_COMMENT=$(gh api repos/${{ github.repository }}/issues/${PR}/comments \
            --jq '.[-1].body // ""')
          if echo "$LAST_COMMENT" | grep -q "CI checks have failed"; then
            echo "Already notified Claude about CI failure, skipping"
            exit 0
          fi

          gh pr comment "$PR" --repo ${{ github.repository }} \
            --body "@claude CI checks have failed on this PR. Please read the CI logs, identify the failures you can fix (lint, test, build errors), fix them, and push the changes."
        env:
          GH_TOKEN: ${{ github.token }}

  # Auto-request Copilot review on non-draft PRs (backup for ruleset)
  request-copilot-review:
    if: |
      github.event_name == 'pull_request' &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request Copilot review
        continue-on-error: true
        run: |
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers \
            --method POST -f "reviewers[]=copilot"
        env:
          GH_TOKEN: ${{ github.token }}
