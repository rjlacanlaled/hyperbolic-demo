# Each action subdirectory (hyperbolic/, sxt/) has its own `dist/` directory.
# This workflow ensures those directories contain the expected transpiled code.
#
# If this workflow is run from a feature branch, it will act as an additional CI
# check and fail if the checked-in dist directories do not match what is
# expected from the build.
name: Check Transpiled JavaScript

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-dist:
    name: Check dist/
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Remove dist/ Directories
        id: remove-dist
        run: npx rimraf ./hyperbolic/dist ./sxt/dist

      - name: Install Dependencies
        id: install
        run: npm ci

      - name: Build dist/ Directories
        id: build
        run: npm run bundle

      - name: Compare Directories
        id: diff
        run: |
          for dir in hyperbolic/dist sxt/dist; do
            if [ ! -d "$dir" ]; then
              echo "Expected $dir directory does not exist. See status below:"
              ls -la ./
              exit 1
            fi
            if [ "$(git diff --ignore-space-at-eol --text "$dir" | wc -l)" -gt "0" ]; then
              echo "Detected uncommitted changes in $dir after build. See status below:"
              git diff --ignore-space-at-eol --text "$dir"
              exit 1
            fi
          done

      - if: ${{ failure() && steps.diff.outcome == 'failure' }}
        name: Upload Artifact
        id: upload
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: |
            hyperbolic/dist/
            sxt/dist/
