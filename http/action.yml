name: HTTP Request
description: Make an HTTP request and return the response
author: GitHub Actions

inputs:
  url:
    description: Request URL
    required: true
  method:
    description: HTTP method
    required: false
    default: POST
  headers:
    description: JSON string of request headers
    required: false
    default: '{}'
  body:
    description: Request body string
    required: false
    default: ''
  decode-fields:
    description: Base64url-decode these fields in JSON array response
    required: false
  output-fields:
    description: Keep only these fields in the output (comma-separated)
    required: false
  select-keys:
    description: >-
      Extract keys from decoded JSON arrays of {name, value} objects.
      Format: FIELD:key1,key2;FIELD2:key3
    required: false
  limit:
    description: Limit number of rows in JSON array response (0 for no limit)
    required: false
    default: '0'
  response-fields:
    description: Comma-separated JSON field names to extract as separate outputs (field-NAME)
    required: false
  encryption-key:
    description: AES-256-GCM key - encrypts outputs and auto-decrypts inputs/header values
    required: false

outputs:
  response:
    description: Response body as string (encrypted if encryption-key provided)
  status:
    description: HTTP status code
  encrypted:
    description: Whether response output is encrypted (true/false)

runs:
  using: node24
  main: dist/index.js
