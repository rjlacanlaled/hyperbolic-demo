name: HTTP Request
description: Make an HTTP request and return the response
author: GitHub Actions

inputs:
  url:
    description: Request URL
    required: true
  method:
    description: HTTP method
    required: false
    default: POST
  headers:
    description: JSON string of request headers
    required: false
    default: '{}'
  body:
    description: Request body string
    required: false
    default: ''
  encryption-key:
    description: AES-256-GCM key for encrypting outputs and decrypting inputs
    required: false
  encrypted-inputs:
    description: Comma-separated input names to decrypt before use
    required: false

outputs:
  response:
    description: Response body as string (encrypted if encryption-key provided)
  status:
    description: HTTP status code
  encrypted:
    description: Whether response output is encrypted (true/false)

runs:
  using: node24
  main: dist/index.js
